# @package _global_
# Proposal proxy for qwen/qwen3.5-9b → Qwen2.5-7B-Instruct.
model:
  base_model: Qwen/Qwen2.5-7B-Instruct
  peft_r: 16
  peft_alpha: 32
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  attn_implementation: sdpa

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
