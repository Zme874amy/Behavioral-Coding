# @package _global_
# Fallback if gemma-3n-E4B + peft fails (standard Gemma 2 causal LM).
model:
  base_model: google/gemma-2-9b-it
  trust_remote_code: true
  peft_r: 16
  peft_alpha: 32
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
