# SFT on HUMAN-LABELED MI data with Leave-One-Dataset-Out evaluation.
#
# Usage:
#   PYTHONPATH=src python src/sft/main.py +sft_models=qwen7b sft_device=cuda \
#       hydra.run.dir=outputs/sft_runs/qwen7b_rich
#
# See docs/HF_SETUP.md for Hugging Face login and gated Gemma licenses.

defaults:
  - sft_device: cuda
  - _self_

class_structure: t2
train_datasets: [miv63a]
test_dataset: hlqc

prompt_style: rich

model:
  base_model: Qwen/Qwen2.5-7B-Instruct
  use_peft: true
  peft_r: 16
  peft_alpha: 32
  peft_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  fp16: false
  bf16: true
  trust_remote_code: false
  attn_implementation: sdpa

training:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  num_train_epochs: 2
  learning_rate: 1e-4
  max_length: 832
  max_target_length: 8
  validation_split: 0.0
  train_subset_size: null
  seed: 42
  logging_steps: 10
  save_steps: 10000
  save_total_limit: 1
  show_tqdm: true
  max_grad_norm: 1.0
  warmup_ratio: 0.05
  weight_decay: 0.0
  lr_scheduler_type: cosine
  gradient_checkpointing: true

evaluation:
  sample_size: 200
  max_new_tokens: 6
  max_input_len: 832
  force_cpu: false
  adapter_dir: null
