input_dataset:
  name: MIV6.3A
  subset: lowconf

n_conversations: 5

parser:
  models:
    - provider: lmstudio
      model: google/gemma-4-e4b
      temperature: 0.0
    - provider: lmstudio
      model: qwen/qwen3.5-9b
      temperature: 0.0

annotator:
  models:
    - provider: lmstudio
      model: google/gemma-4-e4b
      context_mode: interval
      num_context_turns: 5
      class_structure: tiered
      temperature: 0.0
    - provider: lmstudio
      model: qwen/qwen3.5-9b
      context_mode: interval
      num_context_turns: 5
      class_structure: tiered
      temperature: 0.0

fine_tuning:
  enabled: true
  configs:
    - enabled: false
    - provider: local
      enabled: true
      base_model: Qwen/Qwen2.5-0.5B-Instruct
      use_peft: true
      peft_r: 8
      peft_alpha: 16
      peft_dropout: 0.1
      target_modules: [q_proj, v_proj]
      fp16: false
      per_device_train_batch_size: 2
      per_device_eval_batch_size: 2
      gradient_accumulation_steps: 1
      num_train_epochs: 1
      learning_rate: 2e-4
      max_length: 384
      max_target_length: 64
      validation_split: 0.1
      label_field: auto
      output_dir: data/fine_tuning
      logging_steps: 10
      save_steps: 100
      save_total_limit: 1
      show_tqdm: true
      seed: 42
    - provider: local
      enabled: true
      base_model: google/gemma-2b-it
      use_peft: true
      peft_r: 8
      peft_alpha: 16
      peft_dropout: 0.1
      target_modules: [q_proj, v_proj]
      fp16: false
      per_device_train_batch_size: 1
      per_device_eval_batch_size: 1
      gradient_accumulation_steps: 2
      num_train_epochs: 1
      learning_rate: 2e-4
      max_length: 384
      max_target_length: 64
      validation_split: 0.1
      label_field: auto
      output_dir: data/fine_tuning
      logging_steps: 10
      save_steps: 100
      save_total_limit: 1
      show_tqdm: true
      seed: 43

experiment:
  checkpoint_dir: outputs/checkpoints
  resume_from_checkpoint: false
  checkpoint_frequency: 1
  run_evaluation: true
  evaluation_methods: [IRR, relate_outcomes, fine_tuning_comparison]
  max_parallel_jobs: 1
