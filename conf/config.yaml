input_dataset:
  name: MIV6.3A
  subset: lowconf

n_conversations: 10

# Multi-model support: specify lists of models to test combinations
parser:
  # Can be a single model or list of models
  models: 
    - provider: lmstudio
      model: google/gemma-4-e4b
      temperature: 0.0
  # Legacy single model support (will be converted to list if used)
  # provider: lmstudio
  # model: google/gemma-4-e4b
  # temperature: 0.0

annotator:
  # Can be a single model or list of models
  models:
    - provider: lmstudio
      model: qwen/qwen3.5-9b
      context_mode: interval
      num_context_turns: 5
      class_structure: tiered
      temperature: 0.0
  # Legacy single model support (will be converted to list if used)
  # provider: lmstudio
  # model: qwen/qwen3.5-9b
  # context_mode: interval
  # num_context_turns: 5
  # class_structure: tiered
  # temperature: 0.0

fine_tuning:
  # Provider: 'local' (Hugging Face) or 'openai'
  enabled: false
  # Can be a single config or list of configs
  configs:
    - provider: local
      base_model: gpt2
      use_peft: false
      peft_r: 8
      peft_alpha: 16
      peft_dropout: 0.1
      target_modules: [q_proj, v_proj]
      fp16: false
      per_device_train_batch_size: 4
      per_device_eval_batch_size: 4
      gradient_accumulation_steps: 1
      num_train_epochs: 3
      learning_rate: 2e-4
      max_length: 512
      max_target_length: 64
      validation_split: 0.1
      label_field: auto
      output_dir: data/fine_tuning
      logging_steps: 20
      save_steps: 200
      save_total_limit: 2
      show_tqdm: true
      seed: 42
  # Legacy single config support (will be converted to list if used)
  # provider: local
  # base_model: gpt2
  # ... (rest of config)

# Experiment control
experiment:
  # Checkpointing for progress recovery
  checkpoint_dir: outputs/checkpoints
  resume_from_checkpoint: false
  checkpoint_frequency: 1  # Save checkpoint after every N model combinations
  
  # Evaluation settings
  run_evaluation: true
  evaluation_methods: [IRR, relate_outcomes, fine_tuning_comparison]
  
  # Parallel processing (future enhancement)
  max_parallel_jobs: 1  # Currently sequential, can be extended to parallel

