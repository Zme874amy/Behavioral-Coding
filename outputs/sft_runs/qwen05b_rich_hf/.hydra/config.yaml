model:
  fp16: false
  bf16: true
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  use_peft: true
  peft_r: 8
  peft_alpha: 16
  peft_dropout: 0.05
  target_modules:
  - q_proj
  - v_proj
  trust_remote_code: false
  attn_implementation: sdpa
training:
  max_grad_norm: 1.0
  train_subset_size: 80
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  num_train_epochs: 2
  learning_rate: 0.0001
  max_length: 832
  max_target_length: 8
  validation_split: 0.0
  seed: 42
  logging_steps: 10
  save_steps: 10000
  save_total_limit: 1
  show_tqdm: true
  warmup_ratio: 0.05
  weight_decay: 0.0
  lr_scheduler_type: cosine
evaluation:
  force_cpu: false
  sample_size: 40
  max_new_tokens: 6
  max_input_len: 832
  adapter_dir: null
class_structure: t2
train_datasets:
- miv63a
test_dataset: hlqc
prompt_style: rich
