class_structure: t2
train_datasets:
- miv63a
test_dataset: hlqc
prompt_style: rich
model:
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  use_peft: true
  peft_r: 8
  peft_alpha: 16
  peft_dropout: 0.05
  target_modules:
  - q_proj
  - v_proj
  fp16: false
training:
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1
  num_train_epochs: 2
  learning_rate: 0.0001
  max_length: 832
  max_target_length: 8
  validation_split: 0.0
  train_subset_size: 400
  seed: 42
  logging_steps: 10
  save_steps: 10000
  save_total_limit: 1
  show_tqdm: true
  max_grad_norm: 0.0
  warmup_ratio: 0.05
  weight_decay: 0.0
  lr_scheduler_type: cosine
evaluation:
  sample_size: 200
  max_new_tokens: 6
  max_input_len: 832
  force_cpu: true
  adapter_dir: null
